version: "3.9"

services:

  backend:
    build: ./backend
    container_name: django-backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - embeddings_cache:/app/recomendacao/ml_models/embeddings_cache
    ports:
      - "8000:8000"
    depends_on:
      - ai-service
    environment:
      - AI_SERVICE_URL=http://ai-service:8001 
    networks:
      - rh-net

  ai-service:
    build: ./ai-service
    container_name: ai-service
    command: uvicorn main:app --host 0.0.0.0 --port 8001
    volumes:
      - embeddings_cache:/app/embeddings_cache
    ports:
      - "8001:8001"
    depends_on:
      ollama-init:
        condition: service_completed_successfully  
    environment:
      - OLLAMA_URL=http://ollama:11434
      - MODELO_TEXTO=gemma3:4b
      - MODELO_EMBEDDINGS=nomic-embed-text
    networks:
      - rh-net

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_INSECURE=1
    networks:
      - rh-net

  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_INSECURE=1
    entrypoint: >
      /bin/sh -c "
      echo '⏳ Aguardando Ollama iniciar...';
      until ollama list > /dev/null 2>&1; do
        sleep 2;
      done;
      echo 'Baixando gemma3:4b...';
      ollama pull gemma3:4b;
      echo 'Baixando nomic-embed-text...';
      ollama pull nomic-embed-text;
      echo 'Modelos prontos!';
      "
    networks:
      - rh-net

volumes:
  ollama_data:
  embeddings_cache:

networks:
  rh-net:
    driver: bridge